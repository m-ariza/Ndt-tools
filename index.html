<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA META TAGS -->
    <title>GammaCalc</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GammaCalc">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000'/%3E%3Ccircle cx='50' cy='50' r='12' fill='%23ff1476'/%3E%3Cpath d='M43.25 38.31 L27.50 11.03 A45 45 0 0 1 72.50 11.03 L56.75 38.31 A13.5 13.5 0 0 0 43.25 38.31 Z M63.50 50.00 L95.00 50.00 A45 45 0 0 1 72.50 88.97 L56.75 61.69 A13.5 13.5 0 0 0 63.50 50.00 Z M43.25 61.69 L27.50 88.97 A45 45 0 0 1 5.00 50.00 L36.50 50.00 A13.5 13.5 0 0 0 43.25 61.69 Z' fill='%23ff1476'/%3E%3C/svg%3E">

    <style>
        :root {
            /* SYSTEM TOKENS (LIGHT) */
            --chassis: #e5e5e5; 
            --surface: #f4f4f5; 
            --display-bg: #0a0a0c; 
            
            --ink: #18181b; 
            --ink-dim: #71717a;
            --display-ink: #ffffff; 
            --display-dim: #71717a;
            
            --accent: #d81b60; /* Active Indicator */
            
            --border: #d4d4d8;
            --border-display: #000000;
            
            --input-bg: #e5e5e5; 
            --input-focus-bg: #ffffff;
            
            --overlay: rgba(0, 0, 0, 0.7); 
            --radius: 2px; 
            
            /* MICRO-RECESS */
            --recess: inset 0 1px 0 rgba(0, 0, 0, 0.1), inset 0 -1px 0 rgba(255, 255, 255, 0.8);
            --recess-deep: inset 0 2px 0 rgba(0, 0, 0, 0.15), inset 0 -1px 0 rgba(255, 255, 255, 1);
        }

        body.dark-mode {
            /* SYSTEM TOKENS (DARK) */
            --chassis: #000000; 
            --surface: #0f0f11; 
            --display-bg: #000000; 
            
            --ink: #e2e8f0; 
            --ink-dim: #8b949e;
            --display-ink: #ffffff;
            --display-dim: #71717a;
            
            --accent: #ff1476; 
            
            --border: #27272a;
            --border-display: #000000;
            
            --input-bg: #050505;
            --input-focus-bg: #18181b;
            
            --recess: inset 0 1px 0 rgba(0, 0, 0, 0.8), inset 0 -1px 0 rgba(255, 255, 255, 0.05);
            --recess-deep: inset 0 2px 0 rgba(0, 0, 0, 0.9), inset 0 -1px 0 rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html { scroll-padding-top: 240px; }

        body {
            margin: 0;
            background-color: var(--chassis);
            color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            -webkit-user-select: none;
            user-select: none;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            margin: 0 auto;
            padding: 0 24px 120px 24px;
            position: relative;
        }

        /* --- MAIN DISPLAY --- */
        .sticky-readout {
            position: sticky;
            top: 0;
            background: var(--display-bg); 
            z-index: 100;
            padding: 40px 24px 20px 24px;
            margin: 0 -24px 30px -24px;
            border-bottom: 2px solid var(--border-display);
            box-shadow: 0 1px 0 rgba(255,255,255,0.1); 
            transition: background-color 0.2s ease;
        }

        .readout-label {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px; 
            color: var(--accent);
            display: block;
            margin-bottom: 8px;
        }

        .time-value {
            font-family: "SF Mono", "Menlo", monospace;
            font-size: 4.2rem;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
            margin-left: -2px;
            color: var(--display-ink);
            font-variant-numeric: tabular-nums;
        }

        .telemetry-strip {
            display: flex;
            gap: 16px;
            margin-top: 20px;
            border-top: 1px solid #222; 
            padding-top: 12px;
        }

        .telemetry-item {
            font-family: "SF Mono", monospace;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--display-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .telemetry-item span {
            color: var(--display-ink);
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .telemetry-item.highlight span { color: var(--accent); }

        /* --- NAVIGATION --- */
        nav { 
            display: flex; margin-bottom: 40px; 
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--recess);
        }
        
        .nav-item {
            flex: 1;
            background: transparent; 
            border: none;
            border-right: 1px solid var(--border); 
            padding: 12px 0;
            font-size: 0.6rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--ink-dim); cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
        }
        .nav-item:last-child { border-right: none; }
        
        .nav-item.active { 
            background: var(--chassis);
            color: var(--ink);
            box-shadow: var(--recess-deep);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            top: 4px; left: 50%; transform: translateX(-50%);
            width: 12px; height: 2px;
            background: var(--accent);
        }

        /* --- INPUT TARGET ZONES --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 16px; }
        .field { display: flex; flex-direction: column; }
        
        .field-header {
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 6px; margin-left: 2px;
            min-height: 20px; 
        }
        
        .field-label-group {
            display: flex; align-items: center; gap: 6px;
        }

        .field label {
            font-size: 0.55rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--ink-dim);
            line-height: 1;
        }

        .decay-ring {
            width: 8px; height: 8px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: conic-gradient(var(--accent) 100%, var(--chassis) 0);
        }

        .micro-btn {
            background: var(--surface); 
            border: 1px solid var(--border);
            border-radius: var(--radius); padding: 3px 6px;
            font-size: 0.5rem; font-weight: 800;
            color: var(--ink-dim); cursor: pointer; letter-spacing: 1px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.5);
            transition: all 0.1s;
        }
        
        body.dark-mode .micro-btn { box-shadow: 0 1px 0 rgba(255,255,255,0.05); }

        .micro-btn:active { 
            background: var(--input-bg);
            box-shadow: var(--recess);
        }

        .micro-btn.toggle-on {
            background: var(--input-bg);
            color: var(--accent);
            box-shadow: var(--recess-deep);
            border-color: var(--border);
        }

        .input-zone {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            display: flex; align-items: baseline;
            box-shadow: var(--recess);
            transition: all 0.1s ease;
        }

        .field:focus-within .input-zone {
            background: var(--input-focus-bg);
            border-color: var(--ink);
            box-shadow: var(--recess-deep);
        }
        .field:focus-within label { color: var(--ink); }

        input {
            background: none; border: none; width: 100%;
            font-size: 1.5rem; font-weight: 500; 
            font-family: "SF Mono", monospace;
            color: var(--ink); outline: none; padding: 0;
            -webkit-user-select: text; user-select: text;
            font-variant-numeric: tabular-nums;
        }

        ::selection { background: var(--accent); color: #ffffff; }

        .unit { font-size: 0.6rem; font-weight: 800; color: var(--ink-dim); margin-left: 8px; }
        .field:focus-within .unit { color: var(--accent); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- CHART MODAL --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay); 
            z-index: 999; display: none; opacity: 0; transition: opacity 0.2s ease;
        }
        
        .bottom-sheet {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
            width: 100%; max-width: 440px;
            background: var(--chassis); 
            border-top: 1px solid var(--border);
            border-radius: 8px 8px 0 0;
            padding: 24px 24px 40px 24px; 
            transition: transform 0.2s cubic-bezier(0.32, 0.72, 0, 1); 
        }
        
        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .sheet-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--ink); }
        .close-btn { background: transparent; border: none; font-size: 1.5rem; color: var(--ink-dim); cursor: pointer; padding: 0; line-height: 1; }
        
        .ref-table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--recess); }
        .ref-table th, .ref-table td { padding: 14px 8px; text-align: center; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        .ref-table th { font-size: 0.55rem; color: var(--ink-dim); text-transform: uppercase; font-weight: 800; letter-spacing: 1px; background: var(--chassis); }
        .ref-table td:first-child, .ref-table th:first-child { text-align: left; }
        .ref-table td:first-child { font-weight: 800; font-size: 0.65rem; color: var(--ink); text-transform: uppercase; letter-spacing: 1px; background: var(--chassis); }
        
        .val-cell { 
            font-family: "SF Mono", monospace; font-size: 1rem; font-weight: 500; 
            cursor: pointer; transition: background 0.1s; 
        }
        .val-cell:active { background: var(--accent); color: white; }

        footer { margin-top: 60px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 20px; }
        
        .invert-btn { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            padding: 8px 14px; font-size: 0.55rem; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1.5px; 
            color: var(--ink-dim); border-radius: var(--radius); cursor: pointer; 
            box-shadow: 0 1px 0 rgba(255,255,255,0.5);
        }
        body.dark-mode .invert-btn { box-shadow: 0 1px 0 rgba(255,255,255,0.05); }
        .invert-btn:active { background: var(--input-bg); box-shadow: var(--recess); }
        
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="light-mode">

    <div class="app-container">
        <!-- MAIN DISPLAY -->
        <div class="sticky-readout">
            <span class="readout-label" id="ctxLabel">Required Exposure</span>
            <div id="mainTime" class="time-value">00:00</div>
            
            <!-- TELEMETRY DATA STRIP -->
            <div class="telemetry-strip" id="telemetryBox">
                <div class="telemetry-item" id="tel1">MATL <span>0.500"</span></div>
                <div class="telemetry-item" id="tel2">ACT <span>0.0 Ci</span></div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav>
            <button class="nav-item active" onclick="switchTab(this, 'exposure')">Exposure</button>
            <button class="nav-item" onclick="switchTab(this, 'adjustment')">Adjustment</button>
            <button class="nav-item" onclick="switchTab(this, 'density')">Density</button>
        </nav>

        <main>
            <!-- EXPOSURE FORMULA -->
            <div id="exposure" class="tab-content active">
                <div class="grid">
                    <div class="field">
                        <div class="field-header">
                            <label>Target Dose</label>
                            <button class="micro-btn" onclick="openChart()">TABLE</button>
                        </div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="targetExp" value="2.8">
                            <span class="unit">R</span>
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-header"><label>Original Ci</label></div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="curies" value="100">
                            <span class="unit">Ci</span>
                        </div>
                    </div>
                    
                    <div class="field">
                        <div class="field-header">
                            <label>Pipe Wall</label>
                            <button id="dwToggleBtn" class="micro-btn toggle-on" onclick="toggleDW()">DW [x2]</button>
                        </div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="pipeThick" value="0.250">
                            <span class="unit">In</span>
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-header"><label>Shim</label></div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="shimThick" value="0.0">
                            <span class="unit">In</span>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-header"><label>Distance</label></div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="sfd" value="18">
                            <span class="unit">In</span>
                        </div>
                    </div>
                    <div class="field">
                        <div class="field-header">
                            <div class="field-label-group">
                                <label>Source Age</label>
                                <div class="decay-ring" id="decayRing"></div>
                            </div>
                        </div>
                        <div class="input-zone">
                            <input type="text" inputmode="decimal" pattern="[0-9\.]*" id="age" value="0">
                            <span class="unit">Mo</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ADJUSTMENT -->
            <div id="adjustment" class="tab-content">
                <div class="grid">
                    <div class="field" style="grid-column: span 2;">
                        <div class="field-header"><label>Base Exposure Time</label></div>
                        <div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="t1" value="1.0"><span class="unit">Min</span></div>
                    </div>
                    <div class="field"><div class="field-header"><label>Old SFD</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="d1" value="12"></div></div>
                    <div class="field"><div class="field-header"><label>New SFD</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="d2" value="24"></div></div>
                    <div class="field"><div class="field-header"><label>Old Ci</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="c1" value="100"></div></div>
                    <div class="field"><div class="field-header"><label>New Ci</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="c2" value="100"></div></div>
                </div>
            </div>

            <!-- DENSITY -->
            <div id="density" class="tab-content">
                <div class="grid">
                    <div class="field" style="grid-column: span 2;">
                        <div class="field-header"><label>Initial Exposure Time</label></div>
                        <div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="dt1" value="1.0"><span class="unit">Min</span></div>
                    </div>
                    <div class="field"><div class="field-header"><label>Current Density</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="dens1" value="2.0"></div></div>
                    <div class="field"><div class="field-header"><label>Target Density</label></div><div class="input-zone"><input type="text" inputmode="decimal" pattern="[0-9\.]*" id="dens2" value="3.0"></div></div>
                </div>
            </div>
        </main>

        <footer>
            <div style="font-size: 0.55rem; font-weight: 800; letter-spacing: 2px; color: var(--ink-dim);">IRIDIUM-192 // NDT SYSTEM</div>
            <button class="invert-btn" onclick="document.body.classList.toggle('dark-mode')">POWER</button>
        </footer>
    </div>

    <!-- TARGET EXPOSURE CHART OVERLAY -->
    <div id="chartOverlay" class="modal-overlay" onclick="closeChart(event)">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-header">
                <div class="sheet-title">Exposure Values (Ir-192)</div>
                <button class="close-btn" onclick="closeChart(event)">×</button>
            </div>
            <table class="ref-table">
                <thead><tr><th>Material</th><th>Fuji 100</th><th>Fuji 80</th><th>Fuji 50</th></tr></thead>
                <tbody>
                    <tr><td>Steel</td><td class="val-cell" onclick="setTargetValue(2.8)">2.8</td><td class="val-cell" onclick="setTargetValue(3.8)">3.8</td><td class="val-cell" onclick="setTargetValue(5.5)">5.5</td></tr>
                    <tr><td>Inconel</td><td class="val-cell" onclick="setTargetValue(3.5)">3.5</td><td class="val-cell" onclick="setTargetValue(4.8)">4.8</td><td class="val-cell" onclick="setTargetValue(6.0)">6.0</td></tr>
                    <tr><td>CuNi</td><td class="val-cell" onclick="setTargetValue(4.0)">4.0</td><td class="val-cell" onclick="setTargetValue(5.2)">5.2</td><td class="val-cell" onclick="setTargetValue(6.5)">6.5</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- PWA SERVICE WORKER REGISTRATION -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>

    <script>
        // PHYSICS CONSTANTS
        const HALF_LIFE_DAYS = 73.83;
        const DAYS_IN_MONTH = 30.4375;
        const GAMMA = 5.2;
        const ATTN = 1.1;

        let currentTab = 'exposure';
        let isDoubleWall = true; // Default ON

        function toggleDW() {
            isDoubleWall = !isDoubleWall;
            const btn = document.getElementById('dwToggleBtn');
            if (isDoubleWall) {
                btn.classList.add('toggle-on');
            } else {
                btn.classList.remove('toggle-on');
            }
            runCalc();
        }

        function openChart() {
            const overlay = document.getElementById('chartOverlay');
            overlay.style.display = 'block';
            void overlay.offsetWidth;
            overlay.style.opacity = '1';
            overlay.querySelector('.bottom-sheet').style.transform = 'translateX(-50%) translateY(0)';
        }

        function closeChart(e) {
            if (e) e.stopPropagation();
            const overlay = document.getElementById('chartOverlay');
            overlay.style.opacity = '0';
            overlay.querySelector('.bottom-sheet').style.transform = 'translateX(-50%) translateY(100%)';
            setTimeout(() => { overlay.style.display = 'none'; }, 200);
        }

        function setTargetValue(val) {
            document.getElementById('targetExp').value = val;
            closeChart();
            runCalc();
        }

        function runCalc() {
            const tel1 = document.getElementById('tel1');
            const tel2 = document.getElementById('tel2');

            if (currentTab === 'exposure') {
                const exp = parseFloat(document.getElementById('targetExp').value) || 0;
                const cur = parseFloat(document.getElementById('curies').value) || 0;
                
                const pipeRaw = parseFloat(document.getElementById('pipeThick').value) || 0;
                const pipe = isDoubleWall ? (pipeRaw * 2) : pipeRaw;
                const shim = parseFloat(document.getElementById('shimThick').value) || 0;
                const thk = pipe + shim;
                
                const sfd = parseFloat(document.getElementById('sfd').value) || 0;
                const age = parseFloat(document.getElementById('age').value) || 0;

                if (exp && cur && sfd) {
                    const decayFactor = Math.pow(0.5, age / (HALF_LIFE_DAYS / DAYS_IN_MONTH));
                    const act = cur * decayFactor;
                    const rate = ((act * GAMMA) / Math.pow(sfd / 12, 2)) * Math.exp(-ATTN * thk);
                    
                    formatDisplay((exp / rate) * 60);

                    tel1.innerHTML = `MATL <span>${thk.toFixed(3)}"</span>`;
                    tel2.innerHTML = `ACT <span>${act.toFixed(1)} Ci</span>`;
                    tel1.style.display = 'block'; tel2.style.display = 'block';

                    const decayPercent = Math.max(0, decayFactor * 100);
                    document.getElementById('decayRing').style.background = `conic-gradient(var(--accent) ${decayPercent}%, var(--chassis) 0)`;
                }
            } else if (currentTab === 'adjustment') {
                const t1 = parseFloat(document.getElementById('t1').value) || 0;
                const d1 = parseFloat(document.getElementById('d1').value) || 0;
                const d2 = parseFloat(document.getElementById('d2').value) || 0;
                const c1 = parseFloat(document.getElementById('c1').value) || 0;
                const c2 = parseFloat(document.getElementById('c2').value) || 0;
                if (t1 && d1 && d2 && c1 && c2) {
                    const ratio = Math.pow(d2 / d1, 2) * (c1 / c2);
                    formatDisplay(t1 * ratio);
                    
                    tel1.innerHTML = `FACTOR <span>${ratio.toFixed(2)}x</span>`;
                    tel2.style.display = 'none';
                }
            } else if (currentTab === 'density') {
                const t1 = parseFloat(document.getElementById('dt1').value) || 0;
                const d1 = parseFloat(document.getElementById('dens1').value) || 0;
                const d2 = parseFloat(document.getElementById('dens2').value) || 0;
                if (t1 && d1 && d2) {
                    formatDisplay(t1 * (d2 / d1));
                    
                    const shift = d2 - d1;
                    const sign = shift > 0 ? '+' : '';
                    tel1.innerHTML = `SHIFT <span>${sign}${shift.toFixed(2)} ΔD</span>`;
                    tel2.style.display = 'none';
                }
            }
        }

        function formatDisplay(mins) {
            let h = Math.floor(mins / 60);
            let m = Math.floor(mins % 60);
            let s = Math.round((mins * 60) % 60);
            if (s >= 60) { s = 0; m++; }
            if (m >= 60) { m = 0; h++; }

            const hh = h.toString().padStart(2, '0');
            const mm = m.toString().padStart(2, '0');
            const ss = s.toString().padStart(2, '0');

            document.getElementById("mainTime").innerText = h > 0 ? `${hh}:${mm}:${ss}` : `${mm}:${ss}`;
        }

        function switchTab(el, id) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(id).classList.add('active');
            
            const labels = {'exposure': 'Required Exposure', 'adjustment': 'Adjusted Exposure', 'density': 'Corrected Exposure'};
            document.getElementById('ctxLabel').innerText = labels[id];
            
            currentTab = id;
            runCalc();
        }

        const tel1 = document.getElementById('tel1');
        const pipeInput = document.getElementById('pipeThick');
        const shimInput = document.getElementById('shimThick');

        function highlightMatl() { if(currentTab === 'exposure') tel1.classList.add('highlight'); }
        function unhighlightMatl() { tel1.classList.remove('highlight'); }

        pipeInput.addEventListener('focus', highlightMatl);
        pipeInput.addEventListener('blur', unhighlightMatl);
        shimInput.addEventListener('focus', highlightMatl);
        shimInput.addEventListener('blur', unhighlightMatl);

        document.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('focus', function() {
                setTimeout(() => { this.select(); this.setSelectionRange(0, 9999); }, 10);
            });
            inp.addEventListener('click', function() { this.select(); this.setSelectionRange(0, 9999); });
            inp.addEventListener('mouseup', (e) => { e.preventDefault(); });
        });

        document.addEventListener('input', runCalc);
        window.onload = runCalc;
    </script>
</body>
</html>
